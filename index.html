<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NG集团导航</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei";
}

body{
background:#f3f6fb;
padding:15px;
}

.card{
background:#fff;
border-radius:20px;
padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
margin-bottom:15px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
}

.logo img{
width:50px;
height:50px;
border-radius:12px;
margin-right:10px;
}

.share{
background:linear-gradient(135deg,#d9a441,#5fa8ff);
color:#fff;
padding:12px 25px;
border-radius:15px;
font-weight:bold;
border:none;
}

.banner{
height:220px;
border-radius:25px;
background:linear-gradient(135deg,#dfe8f5,#fef7df);
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
font-weight:bold;
color:#222;
margin-bottom:15px;
}

.notice{
background:#fff;
padding:12px;
border-radius:15px;
font-size:14px;
margin-bottom:15px;
}

.title{
font-size:28px;
font-weight:bold;
margin-bottom:5px;
}

.desc{
color:#888;
margin-bottom:15px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:12px;
text-align:center;
background:#fff;
border-radius:15px;
font-weight:bold;
}

.active{
background:linear-gradient(135deg,#d7a43f,#5ea8ff);
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.item{
background:white;
border-radius:15px;
padding:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.05);
}

.item img{
width:50px;
height:50px;
border-radius:12px;
margin-bottom:5px;
}

.item p{
font-size:13px;
}

.service{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.service-item{
background:white;
border-radius:15px;
padding:15px;
text-align:center;
}

.service-item h3{
margin-bottom:5px;
}

a{
text-decoration:none;
color:#222;
}
</style>
</head>

<body>

<div class="card top">
<div class="logo">
<img src="https://via.placeholder.com/50">
<div>
<h3>NG集团官网</h3>
<p style="color:#888">官方网址：ng.com</p>
</div>
</div>

<button class="share">分享</button>
</div>

<div class="banner">
NG集团
</div>

<div class="notice">
📢 官方公告：请认准唯一官方网站入口。
</div>

<div class="title">
平台入口
</div>

<div class="desc">
点击平台图标进入
</div>

<div class="tabs">
<div class="tab active">所有平台</div>
<div class="tab">热门平台</div>
<div class="tab">推荐平台</div>
</div>

<div class="grid">

<a href="#">
<div class="item">
<img src="https://via.placeholder.com/50">
<p>平台1</p>
</div>
</a>

<a href="#">
<div class="item">
<img src="https://via.placeholder.com/50">
<p>平台2</p>
</div>
</a>

<a href="#">
<div class="item">
<img src="https://via.placeholder.com/50">
<p>平台3</p>
</div>
</a>

<a href="#">
<div class="item">
<img src="https://via.placeholder.com/50">
<p>平台4</p>
</div>
</a>

<a href="#">
<div class="item">
<img src="https://via.placeholder.com/50">
<p>平台5</p>
</div>
</a>

<a href="#">
<div class="item">
<img src="https://via.placeholder.com/50">
<p>平台6</p>
</div>
</a>

<a href="#">
<div class="item">
<img src="https://via.placeholder.com/50">
<p>平台7</p>
</div>
</a>

<a href="#">
<div class="item">
<img src="https://via.placeholder.com/50">
<p>平台8</p>
</div>
</a>

</div>

<div class="title" style="margin-top:20px;">
专属客服
</div>

<div class="service">

<div class="service-item">
<h3>在线客服</h3>
<p>点击联系</p>
</div>

<div class="service-item">
<h3>技术客服</h3>
<p>点击联系</p>
</div>

</div>

</body>
</html>
